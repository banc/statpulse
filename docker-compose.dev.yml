version: '3.8'

services:
  postgres-dev:
    image: postgres:15-alpine
    container_name: statpulse-postgres-dev
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local_password
      POSTGRES_DB: statpulse_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

  redis-dev:
    image: redis:7-alpine
    container_name: statpulse-redis-dev
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata_dev: